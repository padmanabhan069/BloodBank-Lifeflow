{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block auth_content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card-custom p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center mb-3"
                        style="width:70px;height:70px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:50%;">
                        <i class="bi bi-lock-fill" style="font-size:32px;color:white;"></i>
                    </div>
                    <h3>Set New Password</h3>
                </div>
                <form method="POST" novalidate>
                    {{ form.hidden_tag() }}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">New Password</label>
                        {{ form.password(class="form-control form-control-custom") }}
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Confirm Password</label>
                        {{ form.confirm_password(class="form-control form-control-custom") }}
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100">Reset Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
